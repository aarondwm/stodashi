<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stodashi</title>
  <meta name="description" content="Operating today's software. Building tomorrow's." />
  <meta name="robots" content="index,follow" />
  <link rel="icon" type="image/png" href="/assets/stodashi-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
/* ==========================================================================
   stodashi — stylesheet
   Light cream background, dark text, hairline rules, mono accents.
   No shadows, no gradients, no rounded corners >2px.
   ========================================================================== */

:root {
  --obsidian: #0A0A0B;
  --bone: #F2F0E8;
  --ash: #6E6E70;
  --hairline: #D6D4CD;
  --oxblood: #791F1F;

  --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  background: var(--bone);
  color: var(--obsidian);
  font-family: var(--font-display);
  font-weight: 400;
  letter-spacing: -0.005em;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 32px 48px 24px;
}

a { color: inherit; text-decoration: none; transition: color 200ms ease, border-color 200ms ease; }
::selection { background: var(--obsidian); color: var(--bone); }

/* ==========================================================================
   Site header — same on every page
   ========================================================================== */
.site-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 88px;
}

.lockup { display: inline-flex; align-items: center; gap: 12px; }

.lockup-mark {
  width: 28px;
  height: 28px;
  background: var(--oxblood);
  color: var(--bone);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0;
  line-height: 1;
}

.lockup-text { font-size: 17px; letter-spacing: -0.005em; color: var(--obsidian); }

.stamp {
  font-family: var(--font-mono);
  font-size: 11px;
  text-align: right;
  letter-spacing: 0.04em;
  line-height: 1.7;
  color: var(--obsidian);
}
.stamp a:hover { color: var(--obsidian); }

main { flex: 1; display: flex; flex-direction: column; }

/* ==========================================================================
   Bottom-edge index — same on every page
   ========================================================================== */
.index {
  margin-top: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--hairline);
  padding-top: 18px;
}
.index-item { padding-right: 24px; }
.index-item .num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--obsidian);
  margin-bottom: 4px;
  display: block;
}
.index-item .name { font-size: 13px; letter-spacing: -0.005em; color: var(--obsidian); }
.index-item.current a { pointer-events: none; }
.index-item.current .num::after { content: '  ·'; }

/* ==========================================================================
   PAGE: Lobby (index) — single statement, vertically centered, lots of air
   ========================================================================== */
.lobby {
  flex: 1;
  display: flex;
  align-items: center;
  padding-bottom: 12vh;
}

.lobby-statement {
  font-size: clamp(40px, 6vw, 80px);
  line-height: 1.15;
  letter-spacing: -0.028em;
  font-weight: 400;
  margin: 0;
}

.lobby-statement .first,
.lobby-statement .second {
  display: block;
  opacity: 0;
  animation: heroLineIn 720ms cubic-bezier(.2,.7,.2,1) forwards;
}
.lobby-statement .first  { animation-delay: 200ms; }
.lobby-statement .second { animation-delay: 900ms; color: var(--ash); }

@keyframes heroLineIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  .lobby-statement .first,
  .lobby-statement .second { opacity: 1; animation: none; }
}

/* ==========================================================================
   Page transition fade
   ========================================================================== */
@keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
body { animation: pageFadeIn 240ms cubic-bezier(.2,.6,.2,1); }
@media (prefers-reduced-motion: reduce) { body { animation: none; } }

/* ==========================================================================
   Responsive
   ========================================================================== */
@media (max-width: 720px) {
  body { padding: 24px 20px; }
  .site-header { margin-bottom: 56px; }
  .stamp { font-size: 10px; }

  .lobby-statement { font-size: 36px; }

  .index { grid-template-columns: 1fr 1fr; gap: 18px 0; }
  .index-item { padding-right: 12px; }
  .index-item:nth-child(odd) { padding-right: 0; }
}
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="lockup" aria-label="Stodashi home">
      <span class="lockup-mark" aria-hidden="true">[s]</span>
      <span class="lockup-text">stodashi</span>
    </a>
    <div class="stamp">
      <span id="local-time">LDN &mdash;:&mdash;</span><br />
      <a href="mailto:contact@stodashi.com">contact@stodashi.com</a>
    </div>
  </header>

  <main>
    <section class="lobby" aria-label="Statement">
      <h1 class="lobby-statement">
        <span class="first">Operating today&rsquo;s software.</span>
        <span class="second">Building tomorrow&rsquo;s.</span>
      </h1>
    </section>
  </main>

  <nav class="index" aria-label="Sections">
    <div class="index-item">
      <a href="mandate.html"><span class="num">01</span><span class="name">Mandate</span></a>
    </div>
    <div class="index-item">
      <a href="vision.html"><span class="num">02</span><span class="name">Vision</span></a>
    </div>
    <div class="index-item">
      <a href="contact.html"><span class="num">03</span><span class="name">Contact</span></a>
    </div>
    <div class="index-item">
      <a href="legal.html"><span class="num">04</span><span class="name">Legal</span></a>
    </div>
  </nav>

  <script>
    (function () {
      var el = document.getElementById('local-time');
      if (!el) return;
      var fmt = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Europe/London',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
      function tick() { el.textContent = 'LDN ' + fmt.format(new Date()); }
      tick();
      setInterval(tick, 60000);
    })();
  </script>
</body>
</html>
