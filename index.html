<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stodashi</title>
  <meta name="description" content="Operating today's software. Building tomorrow's." />
  <meta name="robots" content="index,follow" />
  <link rel="icon" type="image/png" href="/assets/stodashi-logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --obsidian: #0A0A0B;
      --graphite: #1A1A1C;
      --bone: #F2F0E8;
      --ash: #8C8C8F;
      --iron: #2A2A2D;
      --oxblood: #791F1F;

      --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--obsidian);
      color: var(--bone);
      font-family: var(--font-display);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 64px 32px;
    }

    a { color: inherit; text-decoration: none; transition: color 120ms ease; }

    /* Header ---------------------------------------------------------------- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 80px;
    }

    .lockup {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .lockup-mark {
      width: 32px;
      height: 32px;
      display: block;
    }

    .lockup-text {
      font-size: 17px;
      letter-spacing: -0.005em;
      color: var(--bone);
    }

    .stamp {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ash);
      text-align: right;
      letter-spacing: 0.04em;
      line-height: 1.6;
    }

    /* Hero ------------------------------------------------------------------ */
    main {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .hero {
      font-size: 36px;
      line-height: 1.3;
      letter-spacing: -0.022em;
      color: var(--bone);
      max-width: 640px;
      margin: 0;
      font-weight: 400;
    }

    .hero .second { color: var(--ash); }

    /* Index footer ---------------------------------------------------------- */
    .index {
      border-top: 1px solid var(--iron);
      padding-top: 24px;
      margin-top: 80px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .index-item {
      padding: 0 20px;
      border-right: 1px solid var(--iron);
    }
    .index-item:first-child { padding-left: 0; }
    .index-item:last-child { padding-right: 0; border-right: none; }

    .index-item a {
      display: block;
    }

    .index-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ash);
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .index-title {
      font-size: 14px;
      color: var(--bone);
      letter-spacing: -0.005em;
      margin-bottom: 6px;
      display: block;
    }

    .index-desc {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ash);
      line-height: 1.5;
      letter-spacing: 0.02em;
    }

    .index-item a:hover .index-num { color: var(--bone); }

    @media (max-width: 720px) {
      body { padding: 32px 24px; }
      header { margin-bottom: 56px; }
      .hero { font-size: 26px; }
      .index {
        grid-template-columns: 1fr 1fr;
        gap: 24px 0;
        margin-top: 56px;
      }
      .index-item:nth-child(2) { border-right: none; padding-right: 0; }
      .index-item:nth-child(3) { padding-left: 0; border-right: 1px solid var(--iron); }
      .index-item:nth-child(4) { padding-right: 0; border-right: none; }
    }

    @media (max-width: 420px) {
      .index { grid-template-columns: 1fr; }
      .index-item {
        padding: 16px 0;
        border-right: none !important;
        border-bottom: 1px solid var(--iron);
      }
      .index-item:last-child { border-bottom: none; }
    }

    /* Page transition ------------------------------------------------------- */
    @view-transition { navigation: auto; }
    @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
    body { animation: pageFadeIn 320ms cubic-bezier(0.2, 0.6, 0.2, 1); }
    @supports (view-transition-name: none) { body { animation: none; } }
    @media (prefers-reduced-motion: reduce) { body { animation: none; } }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="lockup" aria-label="Stodashi home">
      <img src="/assets/stodashi-logo.png" alt="" class="lockup-mark" width="32" height="32" />
      <span class="lockup-text">stodashi</span>
    </a>
    <div class="stamp">
      MMXXVI<br />
      KUWAIT CITY
    </div>
  </header>

  <main>
    <h1 class="hero">
      Operating today&rsquo;s software.<br />
      <span class="second">Building tomorrow&rsquo;s.</span>
    </h1>
  </main>

  <nav class="index" aria-label="Sections">
    <div class="index-item">
      <a href="mandate.html">
        <div class="index-num">01</div>
        <span class="index-title">Mandate</span>
        <div class="index-desc">Build and hold</div>
      </a>
    </div>
    <div class="index-item">
      <a href="approach.html">
        <div class="index-num">02</div>
        <span class="index-title">Approach</span>
        <div class="index-desc">Long-hold operators</div>
      </a>
    </div>
    <div class="index-item">
      <a href="mailto:contact@stodashi.com">
        <div class="index-num">03</div>
        <span class="index-title">Contact</span>
        <div class="index-desc">contact@stodashi.com</div>
      </a>
    </div>
    <div class="index-item">
      <a href="legal.html">
        <div class="index-num">04</div>
        <span class="index-title">Legal</span>
        <div class="index-desc">Entity / jurisdiction</div>
      </a>
    </div>
  </nav>
</body>
</html>
