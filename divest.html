<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Divest &mdash; stodashi</title>
  <meta name="description" content="Sell us software, data, or both." />
  <meta name="robots" content="index,follow" />
  <link rel="icon" type="image/png" href="/assets/stodashi-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
:root {
  --obsidian: #0A0A0B;
  --bone: #F2F0E8;
  --ash: #6E6E70;
  --hairline: #D6D4CD;
  --oxblood: #791F1F;

  --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  background: var(--bone);
  color: var(--obsidian);
  font-family: var(--font-display);
  font-weight: 400;
  letter-spacing: -0.005em;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 32px 48px 24px;
}

a { color: inherit; text-decoration: none; transition: color 200ms ease, border-color 200ms ease; }
::selection { background: var(--obsidian); color: var(--bone); }

.site-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 88px;
}

.lockup { display: inline-flex; align-items: center; gap: 12px; }

.lockup-mark {
  width: 28px;
  height: 28px;
  background: var(--oxblood);
  color: var(--bone);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0;
  line-height: 1;
}

.lockup-text { font-size: 17px; letter-spacing: -0.005em; color: var(--obsidian); }

.stamp {
  font-family: var(--font-mono);
  font-size: 11px;
  text-align: right;
  letter-spacing: 0.04em;
  line-height: 1.7;
  color: var(--obsidian);
}
.stamp a:hover { color: var(--obsidian); }

main { flex: 1; display: flex; flex-direction: column; }

.section-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--obsidian);
  border-bottom: 1px solid var(--hairline);
  padding-bottom: 14px;
  margin-bottom: 64px;
}

.index {
  margin-top: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--hairline);
  padding-top: 18px;
}
.index-item { padding-right: 24px; }
.index-item .num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--obsidian);
  margin-bottom: 4px;
  display: block;
}
.index-item .name { font-size: 13px; letter-spacing: -0.005em; color: var(--obsidian); }
.index-item.current a { pointer-events: none; }
.index-item.current .num::after { content: '  ·'; }

.form-wrap {
  max-width: 640px;
  padding-bottom: 96px;
}

.form-tabs {
  display: flex;
  gap: 28px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 56px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--hairline);
}
.form-tabs a { color: var(--ash); transition: color 200ms ease; }
.form-tabs a:hover { color: var(--obsidian); }
.form-tabs a.current { color: var(--obsidian); pointer-events: none; }

.form-prompt {
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.25;
  margin: 0 0 12px;
}

.form-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--ash);
  margin: 0 0 40px;
  line-height: 1.7;
}

.field {
  border-bottom: 1px solid var(--hairline);
  padding: 12px 0;
}

.field-label {
  display: block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ash);
  margin-bottom: 6px;
}

.field input,
.field textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--obsidian);
  font-family: var(--font-display);
  font-size: 15px;
  line-height: 1.6;
  letter-spacing: -0.005em;
  padding: 0;
  resize: none;
}
.field input::placeholder,
.field textarea::placeholder {
  color: var(--ash);
  opacity: 0.55;
  font-style: italic;
}

.form-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 32px;
  gap: 16px;
}

.attach-trigger {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid var(--hairline);
  background: transparent;
  color: var(--obsidian);
  padding: 9px 16px;
  cursor: pointer;
  transition: border-color 200ms ease;
}
.attach-trigger:hover { border-color: var(--obsidian); }

.attach-name {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--obsidian);
  letter-spacing: 0.02em;
  margin-left: 12px;
}

.submit-btn {
  background: var(--obsidian);
  color: var(--bone);
  border: 1px solid var(--obsidian);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 10px 22px;
  cursor: pointer;
  transition: opacity 200ms ease;
}
.submit-btn:hover { opacity: 0.85; }

.divest-form .field {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  align-items: baseline;
  padding: 14px 0;
}
.divest-form .field-label {
  margin-bottom: 0;
  padding-top: 4px;
}
.divest-form .field.summary {
  display: block;
}
.divest-form .field.summary .field-label { padding-top: 0; margin-bottom: 6px; }
.divest-form .field.summary textarea { min-height: 90px; }

@keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
body { animation: pageFadeIn 240ms cubic-bezier(.2,.6,.2,1); }
@media (prefers-reduced-motion: reduce) { body { animation: none; } }

@media (max-width: 720px) {
  body { padding: 24px 20px; }
  .site-header { margin-bottom: 56px; }
  .stamp { font-size: 10px; }
  .form-prompt { font-size: 22px; }
  .divest-form .field { grid-template-columns: 1fr; gap: 4px; padding: 10px 0; }
  .divest-form .field-label { padding-top: 0; margin-bottom: 4px; }
  .index { grid-template-columns: 1fr 1fr; gap: 18px 0; }
  .index-item { padding-right: 12px; }
  .index-item:nth-child(odd) { padding-right: 0; }
}
@media (max-width: 420px) {
  .form-tabs { gap: 14px; flex-wrap: wrap; }
  .form-actions { flex-direction: column; align-items: stretch; }
  .submit-btn { text-align: center; }
}
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="lockup" aria-label="Stodashi home">
      <span class="lockup-mark" aria-hidden="true">[s]</span>
      <span class="lockup-text">stodashi</span>
    </a>
    <div class="stamp">
      <span id="local-time">LDN &mdash;:&mdash;</span><br />
      <a href="mailto:contact@stodashi.com">contact@stodashi.com</a>
    </div>
  </header>

  <main>
    <div class="section-meta">
      <span>Contact &middot; Divest</span>
      <span>03 / 04</span>
    </div>

    <section class="form-wrap" aria-label="Divest">
      <nav class="form-tabs" aria-label="Inquiry type">
        <a href="engage.html">Engage</a>
        <a href="connect.html">Connect</a>
        <a href="divest.html" class="current" aria-current="page">Divest</a>
      </nav>

      <h1 class="form-prompt">What you&rsquo;re selling.</h1>
      <p class="form-sub">Software, data, or both. Held what we buy. No flips, no breakups, no exits.</p>

      <form action="" method="POST" enctype="multipart/form-data" novalidate class="divest-form">
        <div class="field">
          <label for="name" class="field-label">Name</label>
          <input type="text" id="name" name="name" placeholder="your name and role" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="email" class="field-label">Email</label>
          <input type="email" id="email" name="email" placeholder="reply address" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="company" class="field-label">Company</label>
          <input type="text" id="company" name="company" placeholder="name of the business" required autocomplete="organization" />
        </div>
        <div class="field">
          <label for="kind" class="field-label">What&rsquo;s for sale</label>
          <input type="text" id="kind" name="kind" placeholder="software / data / both" />
        </div>

        <div class="field summary">
          <label for="summary" class="field-label">Summary</label>
          <textarea id="summary" name="summary" rows="4" placeholder="What it does, how it&rsquo;s doing, why now."></textarea>
        </div>

        <div class="form-actions">
          <div>
            <input type="file" id="appendix" name="appendix" hidden />
            <label for="appendix" class="attach-trigger">Attach</label>
            <span class="attach-name" id="attach-name" aria-live="polite"></span>
          </div>
          <button type="submit" class="submit-btn">Send &nbsp;&rarr;</button>
        </div>
      </form>
    </section>
  </main>

  <nav class="index" aria-label="Sections">
    <div class="index-item">
      <a href="mandate.html"><span class="num">01</span><span class="name">Mandate</span></a>
    </div>
    <div class="index-item">
      <a href="vision.html"><span class="num">02</span><span class="name">Vision</span></a>
    </div>
    <div class="index-item current">
      <a href="contact.html" aria-current="page"><span class="num">03</span><span class="name">Contact</span></a>
    </div>
    <div class="index-item">
      <a href="legal.html"><span class="num">04</span><span class="name">Legal</span></a>
    </div>
  </nav>

  <script>
    (function () {
      var el = document.getElementById('local-time');
      if (!el) return;
      var fmt = new Intl.DateTimeFormat('en-GB', {
        timeZone: 'Europe/London',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
      function tick() { el.textContent = 'LDN ' + fmt.format(new Date()); }
      tick();
      setInterval(tick, 60000);
    })();

    (function () {
      var input = document.getElementById('appendix');
      var label = document.getElementById('attach-name');
      if (!input || !label) return;
      input.addEventListener('change', function () {
        var f = input.files && input.files[0];
        label.textContent = f ? f.name : '';
      });
    })();
  </script>
</body>
</html>
