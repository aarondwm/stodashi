<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact &mdash; stodashi</title>
  <meta name="description" content="Stodashi Holding Co. correspondence and contact channels." />
  <meta name="robots" content="index,follow" />
  <link rel="icon" type="image/png" href="/assets/stodashi-logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --obsidian: #0A0A0B;
      --graphite: #1A1A1C;
      --bone: #F2F0E8;
      --ash: #8C8C8F;
      --iron: #2A2A2D;
      --oxblood: #791F1F;

      --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--obsidian);
      color: var(--bone);
      font-family: var(--font-display);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 64px 32px;
    }

    a { color: inherit; text-decoration: none; transition: color 120ms ease; }

    /* Header ---------------------------------------------------------------- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 64px;
    }

    .lockup {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .lockup-mark {
      width: 40px;
      height: 40px;
      display: block;
    }

    .lockup-text {
      font-size: 22px;
      letter-spacing: -0.005em;
      color: var(--bone);
    }

    .section-stamp {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ash);
      letter-spacing: 0.06em;
    }

    /* Main ------------------------------------------------------------------ */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--ash);
      letter-spacing: 0.1em;
      margin-bottom: 36px;
    }

    .address {
      font-family: var(--font-display);
      font-style: normal;
      font-size: 56px;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--bone);
      margin: 0 0 28px;
    }

    .city {
      font-family: var(--font-mono);
      font-size: 15px;
      color: var(--bone);
      letter-spacing: 0.12em;
      margin: 0 0 40px;
    }

    .address-divider {
      border: none;
      border-top: 1px solid var(--iron);
      margin: 0 0 32px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--iron);
      border-bottom: 1px solid var(--iron);
      padding: 28px 0;
      margin-bottom: 40px;
    }
    .action {
      padding: 0 24px;
      border-right: 1px solid var(--iron);
      display: block;
      color: var(--bone);
      transition: opacity 200ms ease;
    }
    .action:first-child { padding-left: 0; }
    .action:last-child { padding-right: 0; border-right: none; }
    .action:hover { opacity: 0.55; }
    .action-num {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--bone);
      margin-bottom: 10px;
      display: block;
    }
    .action-title {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: -0.018em;
      line-height: 1.1;
      color: var(--bone);
      display: block;
    }

    .channels {
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
      margin-bottom: 0;
    }

    .channel-label {
      font-family: var(--font-display);
      font-size: 24px;
      line-height: 1.4;
      letter-spacing: -0.012em;
      color: var(--bone);
      margin-bottom: 8px;
    }

    .channel-value {
      font-family: var(--font-display);
      font-size: 24px;
      line-height: 1.4;
      letter-spacing: -0.012em;
      color: var(--bone);
    }

    a.channel-value:hover {
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1px;
    }

    .note {
      font-family: var(--font-display);
      font-size: 24px;
      line-height: 1.4;
      letter-spacing: -0.012em;
      color: var(--bone);
      margin: auto 0;
      max-width: 56ch;
    }

    /* Index footer ---------------------------------------------------------- */
    .index {
      border-top: 1px solid var(--iron);
      padding-top: 24px;
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .index-item {
      padding: 0 20px;
      border-right: 1px solid var(--iron);
    }
    .index-item:first-child { padding-left: 0; }
    .index-item:last-child { padding-right: 0; border-right: none; }

    .index-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ash);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .index-title {
      font-size: 13px;
      color: var(--ash);
      letter-spacing: -0.005em;
      display: block;
      transition: color 120ms ease;
    }

    .index-item a:hover .index-title,
    .index-item a:hover .index-num { color: var(--bone); }

    /* Current page state */
    .index-item.current .index-num,
    .index-item.current .index-title { color: var(--bone); }

    .index-item.current a[aria-current] {
      pointer-events: none;
    }

    /* Responsive ------------------------------------------------------------ */
    @media (max-width: 800px) {
      body { padding: 32px 24px; }
      header { margin-bottom: 48px; }
      .address { font-size: 36px; }
      .channel-label { font-size: 16px; }
      .channel-value { font-size: 16px; }
      .note { font-size: 16px; }
      .index {
        grid-template-columns: 1fr 1fr;
        gap: 24px 0;
        margin-top: 40px;
      }
      .index-item:nth-child(2) { border-right: none; padding-right: 0; }
      .index-item:nth-child(3) { padding-left: 0; border-right: 1px solid var(--iron); }
    }

    @media (max-width: 480px) {
      .channels { grid-template-columns: 1fr; gap: 18px; }
      .actions { grid-template-columns: 1fr; gap: 12px; }
    }

    @media (max-width: 420px) {
      .index { grid-template-columns: 1fr; }
      .index-item {
        padding: 16px 0;
        border-right: none !important;
        border-bottom: 1px solid var(--iron);
      }
      .index-item:last-child { border-bottom: none; }
    }

    /* Page transition ------------------------------------------------------- */
    @view-transition { navigation: auto; }
    ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 200ms; animation-timing-function: cubic-bezier(0.2, 0.6, 0.2, 1); }
    @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
    body { animation: pageFadeIn 200ms cubic-bezier(0.2, 0.6, 0.2, 1); }
    @supports (view-transition-name: none) { body { animation: none; } }
    @media (prefers-reduced-motion: reduce) { body { animation: none; } }
    .lockup-text .lockup-s { position: relative; display: inline-block; }
    .lockup-text .lockup-s::before { content: ""; position: absolute; top: 0.32em; left: 50%; transform: translateX(-50%); width: 0.075em; height: 0.13em; background: currentColor; }
    /* Inverted palette */
    body { --bone: #0A0A0B; --obsidian: #F2F0E8; --iron: #D6D4CD; --ash: #0A0A0B; }

    /* Glass 3D button -------------------------------------------------------- */
    .glass3d {
      --filter-glass3d: blur(45px) brightness(0.26) saturate(0);
      --color-glass3d: hsl(0 59% 30% / 0.2);
      --noise-glass3d: url("https://www.transparenttextures.com/patterns/egg-shell.png");
      position: relative;
      z-index: 4;
      box-shadow:
        0 0 0.75px hsl(205 20% 10% / 0.2),
        0.7px 0.8px 1.2px -0.4px hsl(205 20% 10% / 0.1),
        1.3px 1.5px 2.2px -0.8px hsl(205 20% 10% / 0.1),
        2.3px 2.6px 3.9px -1.2px hsl(205 20% 10% / 0.1),
        3.9px 4.4px 6.6px -1.7px hsl(205 20% 10% / 0.1),
        6.5px 7.2px 10.9px -2.1px hsl(205 20% 10% / 0.1),
        8px 9px 14px -2.5px hsl(205 20% 10% / 0.2);
    }
    .glass3d::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      overflow: hidden;
      z-index: 3;
      -webkit-backdrop-filter: var(--filter-glass3d);
      backdrop-filter: var(--filter-glass3d);
      background-color: var(--color-glass3d);
      background-image: var(--noise-glass3d);
      background-size: 100px;
      background-repeat: repeat;
    }
    .glass3d::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      overflow: hidden;
      z-index: 5;
      box-shadow:
        inset 2px 2px 1px -3px hsl(205 20% 90% / 0.8),
        inset 4px 4px 2px -6px hsl(205 20% 90% / 0.3),
        inset 1.5px 1.5px 1.5px -0.75px hsl(205 20% 90% / 0.15),
        inset 1.5px 1.5px 0.25px hsl(205 20% 90% / 0.03),
        inset 0 0 0.25px 0.5px hsl(205 20% 90% / 0.03);
    }
    .glass3d > * { position: relative; z-index: 6; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="lockup" aria-label="Stodashi home">
      <img src="/assets/stodashi-logo.png" alt="" class="lockup-mark" width="40" height="40" />
      <span class="lockup-text"><span class="lockup-s">s</span>todashi</span>
    </a>
    <div class="section-stamp">CONTACT / 03</div>
  </header>

  <main>
    <section aria-label="Contact">
      <p class="address">By appointment.</p>
      <p class="city">Kuwait City &mdash; State of Kuwait</p>

      <hr class="address-divider" />

      <div class="actions">
        <a href="engage.html" class="action">
          <span class="action-num">01 &middot; Engage</span>
          <span class="action-title">Original build</span>
        </a>
        <a href="divest.html" class="action">
          <span class="action-num">02 &middot; Divest</span>
          <span class="action-title">Sell to us</span>
        </a>
      </div>

      <div class="channels">
        <div class="channel">
          <div class="channel-label">EMAIL</div>
          <a href="mailto:contact@stodashi.com" class="channel-value">contact@stodashi.com</a>
        </div>
      </div>
    </section>

    <p class="note">We respond to correspondence we can act on.</p>
  </main>

  <nav class="index" aria-label="Sections">
    <div class="index-item">
      <a href="mandate.html">
        <div class="index-num">01</div>
        <span class="index-title">Mandate</span>
      </a>
    </div>
    <div class="index-item">
      <a href="approach.html">
        <div class="index-num">02</div>
        <span class="index-title">Approach</span>
      </a>
    </div>
    <div class="index-item current">
      <a href="contact.html" aria-current="page">
        <div class="index-num">03 &middot;</div>
        <span class="index-title">Contact</span>
      </a>
    </div>
    <div class="index-item">
      <a href="legal.html">
        <div class="index-num">04</div>
        <span class="index-title">Legal</span>
      </a>
    </div>
  </nav>
</body>
</html>
