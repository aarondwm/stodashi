<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>stodashi</title>
  <meta name="description" content="A software firm that builds and holds platforms for institutions." />
  <meta name="robots" content="index,follow" />
  <link rel="icon" type="image/png" href="/assets/stodashi-logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --obsidian: #0A0A0B;
      --graphite: #1A1A1C;
      --bone: #F2F0E8;
      --ash: #8C8C8F;
      --iron: #2A2A2D;
      --oxblood: #791F1F;

      --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--obsidian);
      color: var(--bone);
      font-family: var(--font-display);
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 64px;
    }

    a { color: inherit; text-decoration: none; }

    .lockup {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .lockup-mark {
      width: 32px;
      height: 32px;
      display: block;
    }

    .lockup-text {
      font-size: 16px;
      letter-spacing: -0.005em;
      color: var(--bone);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .statement {
      font-size: 32px;
      line-height: 1.3;
      letter-spacing: -0.02em;
      color: var(--bone);
      max-width: 560px;
      margin: 0;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ash);
      letter-spacing: 0.04em;
    }

    .meta a { transition: color 120ms ease; }
    .meta a:hover { color: var(--bone); }

    @media (max-width: 640px) {
      body { padding: 32px 24px; }
      .statement { font-size: 22px; }
      .meta { flex-direction: column; gap: 8px; align-items: flex-start; }
    }

    /* Page transition ------------------------------------------------------- */
    @view-transition { navigation: auto; }
    @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
    body { animation: pageFadeIn 320ms cubic-bezier(0.2, 0.6, 0.2, 1); }
    @supports (view-transition-name: none) { body { animation: none; } }
    @media (prefers-reduced-motion: reduce) { body { animation: none; } }
    .lockup-text .lockup-s { position: relative; display: inline-block; }
    .lockup-text .lockup-s::before { content: ""; position: absolute; top: 0.32em; left: 50%; transform: translateX(-50%); width: 1.25px; height: 0.13em; background: currentColor; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="lockup" aria-label="Stodashi home">
      <img src="/assets/stodashi-logo.png" alt="" class="lockup-mark" width="32" height="32" />
      <span class="lockup-text"><span class="lockup-s">s</span>todashi</span>
    </a>
  </header>

  <main>
    <p class="statement">We build and hold software for institutions.</p>
  </main>

  <footer class="meta">
    <span>KUWAIT - GLOBAL MANDATE</span>
    <a href="mailto:contact@stodashi.com">contact@stodashi.com</a>
  </footer>
</body>
</html>
